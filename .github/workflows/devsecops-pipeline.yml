name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: latest

jobs:
  security-pipeline:
    name: Build, Test, and Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ----------------------------------------------------------
      # 1. Checkout source code
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------------
      # 2. Secrets scanning
      # ----------------------------------------------------------
      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # 3. Python setup and application validation
      # ----------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Validate Flask application
        run: |
          python -m py_compile app/app.py
          python -c "from app.app import app; print(app.url_map)"

      # ----------------------------------------------------------
      # 4. Build Docker image
      # ----------------------------------------------------------
      - name: Build Docker image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${IMAGE_TAG}" \
            .

      - name: Display Docker image
        run: |
          docker image ls "${IMAGE_NAME}:${IMAGE_TAG}"

      # ----------------------------------------------------------
      # 5. Install Trivy
      # ----------------------------------------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor \
            -o /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

          trivy --version

      # ----------------------------------------------------------
      # 6. Generate Trivy container report
      # ----------------------------------------------------------
      - name: Generate Trivy container report
        run: |
          mkdir -p reports/trivy

          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --output reports/trivy/image-scan.txt \
            "${IMAGE_NAME}:${IMAGE_TAG}"

          cat reports/trivy/image-scan.txt

      # ----------------------------------------------------------
      # 7. Generate Trivy Infrastructure-as-Code report
      # ----------------------------------------------------------
      - name: Generate Trivy IaC report
        run: |
          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --output reports/trivy/iac-scan.txt \
            .

          cat reports/trivy/iac-scan.txt

      # ----------------------------------------------------------
      # 8. Upload Trivy reports
      # ----------------------------------------------------------
      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: reports/trivy/
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------
      # 9. OWASP Dependency-Check
      # ----------------------------------------------------------
      - name: Create Dependency-Check report directory
        if: always()
        run: |
          mkdir -p reports/dependency-check

      - name: Run OWASP Dependency-Check
        if: always()
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -v "$GITHUB_WORKSPACE/reports/dependency-check:/report" \
            owasp/dependency-check:latest \
            --project "secure-cicd-pipeline" \
            --scan /src \
            --format HTML \
            --out /report \
            --failOnCVSS 9

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check/
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------
      # 10. Enforce security gates
      # ----------------------------------------------------------
      - name: Enforce Trivy container security gate
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Enforce Trivy IaC security gate
        run: |
          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .