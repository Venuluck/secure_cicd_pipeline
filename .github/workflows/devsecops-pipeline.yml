name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: latest

jobs:
  security-pipeline:
    name: Build, Test, and Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Validate Flask application
        run: |
          python -m py_compile app/app.py
          python -c "from app.app import app; print(app.url_map)"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${IMAGE_TAG}" \
            .

      - name: Display Docker image
        run: |
          docker image ls "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor \
            -o /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

          trivy --version

      - name: Generate Trivy container report
        run: |
          mkdir -p reports/trivy

          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --output reports/trivy/image-scan.txt \
            "${IMAGE_NAME}:${IMAGE_TAG}"

          cat reports/trivy/image-scan.txt

      - name: Generate Trivy IaC report
        run: |
          mkdir -p reports/trivy

          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --output reports/trivy/iac-scan.txt \
            .

          cat reports/trivy/iac-scan.txt

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: reports/trivy/
          retention-days: 14
          if-no-files-found: warn

      - name: Enforce Trivy container security gate
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Enforce Trivy IaC security gate
        run: |
          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .