name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: ci
  KIND_CLUSTER_NAME: secure-cicd

jobs:
  build-test-security:
    name: Build, Test, and Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run automated tests with coverage
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Verify coverage report
        run: |
          test -f coverage.xml
          ls -lh coverage.xml

      - name: Run SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${IMAGE_TAG}" \
            .

      - name: Display Docker image
        run: |
          docker image ls "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor \
            -o /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

          trivy --version

      - name: Generate Trivy container report
        run: |
          mkdir -p reports/trivy

          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --output reports/trivy/image-scan.txt \
            "${IMAGE_NAME}:${IMAGE_TAG}"

          cat reports/trivy/image-scan.txt

      - name: Generate Trivy IaC report
        run: |
          mkdir -p reports/trivy

          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --output reports/trivy/iac-scan.txt \
            .

          cat reports/trivy/iac-scan.txt

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: reports/trivy/
          retention-days: 14
          if-no-files-found: warn

      - name: Save Docker image
        run: |
          docker save \
            --output secure-app.tar \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: secure-app-image
          path: secure-app.tar
          retention-days: 1
          if-no-files-found: error

      - name: Enforce Trivy container security gate
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Enforce Trivy IaC security gate
        run: |
          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .

  kubernetes-validation:
    name: Kubernetes Kind Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test-security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: secure-app-image
          path: .

      - name: Load Docker image
        run: |
          docker load --input secure-app.tar
          docker image ls "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Install Kind
        run: |
          curl --fail --location --output kind \
            https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64

          chmod +x kind
          sudo mv kind /usr/local/bin/kind

          kind version

      - name: Create Kind cluster
        run: |
          kind create cluster \
            --name "${KIND_CLUSTER_NAME}" \
            --wait 120s

          kubectl cluster-info \
            --context "kind-${KIND_CLUSTER_NAME}"

          kubectl get nodes

      - name: Load image into Kind
        run: |
          kind load docker-image \
            "${IMAGE_NAME}:${IMAGE_TAG}" \
            --name "${KIND_CLUSTER_NAME}"

      - name: Update Kubernetes image tag
        run: |
          sed -i \
            "s|image: secure-app:latest|image: ${IMAGE_NAME}:${IMAGE_TAG}|g" \
            k8s/deployment.yaml

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply \
            --dry-run=client \
            -f k8s/

      - name: Deploy application to Kind
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/network-policy.yaml

      - name: Wait for deployment
        run: |
          kubectl rollout status \
            deployment/secure-app \
            --namespace secure-app \
            --timeout=180s

          kubectl get all \
            --namespace secure-app \
            --output wide

      - name: Test application endpoint
        shell: bash
        run: |
          set -euo pipefail

          kubectl port-forward \
            service/secure-app-service \
            8080:80 \
            --namespace secure-app \
            > port-forward.log 2>&1 &

          PORT_FORWARD_PID=$!

          cleanup() {
            kill "$PORT_FORWARD_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          SUCCESS=false

          for attempt in {1..30}; do
            echo "Endpoint test attempt: $attempt"

            if curl \
              --fail \
              --silent \
              --show-error \
              --connect-timeout 3 \
              --max-time 5 \
              --output response.json \
              http://127.0.0.1:8080/; then

              if [ -s response.json ]; then
                SUCCESS=true
                break
              fi
            fi

            sleep 2
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Application endpoint did not become reachable."

            echo "Port-forward log:"
            cat port-forward.log || true

            echo "Kubernetes resources:"
            kubectl get all \
              --namespace secure-app \
              --output wide || true

            echo "Pod details:"
            kubectl describe pods \
              --namespace secure-app || true

            echo "Application logs:"
            kubectl logs \
              deployment/secure-app \
              --namespace secure-app || true

            exit 1
          fi

          echo "Application response:"
          cat response.json

          python - <<'PY'
          import json

          with open("response.json", encoding="utf-8") as file:
              response = json.load(file)

          assert response["status"] == "running"
          assert response["message"] == (
              "Secure CI/CD pipeline deployed successfully"
          )

          print("Kubernetes application endpoint validation passed.")
          PY

      - name: Collect Kubernetes evidence
        if: always()
        run: |
          mkdir -p reports/kubernetes

          kubectl get all \
            --namespace secure-app \
            --output wide \
            > reports/kubernetes/resources.txt || true

          kubectl describe deployment secure-app \
            --namespace secure-app \
            > reports/kubernetes/deployment.txt || true

          kubectl get networkpolicy \
            --namespace secure-app \
            --output yaml \
            > reports/kubernetes/network-policy.yaml || true

          kubectl logs \
            deployment/secure-app \
            --namespace secure-app \
            > reports/kubernetes/application.log || true

          cp response.json \
            reports/kubernetes/response.json 2>/dev/null || true

          cp port-forward.log \
            reports/kubernetes/port-forward.log 2>/dev/null || true

      - name: Upload Kubernetes evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-validation-evidence
          path: reports/kubernetes/
          retention-days: 14
          if-no-files-found: warn

      - name: Delete Kind cluster
        if: always()
        run: |
          kind delete cluster \
            --name "${KIND_CLUSTER_NAME}"